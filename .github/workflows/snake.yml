name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */6 * * *" # update otomatis tiap 6 jam
  workflow_dispatch: # bisa di-trigger manual dari tab Actions
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVG (neon blue theme)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-neon.svg?palette=%230A0E27,%230072FF,%2300C6FF,%2300F0FF,%238FE9FF

      - name: Push generated SVG to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
